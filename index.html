<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced AI Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/DOMPurify/3.0.6/purify.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0B0F19',
                            panel: '#151C2C',
                            border: '#2A344A'
                        },
                        accent: {
                            primary: '#6366F1', // Indigo
                            secondary: '#EC4899', // Pink
                            glow: 'rgba(99, 102, 241, 0.5)'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'blob': 'blob 7s infinite',
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5); 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }

        /* Glassmorphism utilities */
        .glass {
            background: rgba(21, 28, 44, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-panel {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.4) 100%);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Markdown Styles */
        .prose pre {
            background-color: #0f172a !important;
            border: 1px solid #1e293b;
            border-radius: 0.5rem;
            padding: 1rem;
            overflow-x: auto;
        }
        .prose code {
            color: #e2e8f0;
            background-color: rgba(255,255,255,0.1);
            padding: 0.125rem 0.25rem;
            border-radius: 0.25rem;
            font-size: 0.875em;
        }
        .prose pre code {
            background-color: transparent;
            padding: 0;
            color: inherit;
        }
        .prose p { margin-bottom: 0.75em; }
        .prose p:last-child { margin-bottom: 0; }
        .prose ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 0.75em; }
        .prose ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 0.75em; }
        .prose a { color: #6366f1; text-decoration: underline; }
        
        /* Cursor animation */
        .typing-cursor::after {
            content: '▋';
            display: inline-block;
            animation: blink 1s step-end infinite;
            color: #6366f1;
            margin-left: 2px;
            vertical-align: baseline;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Fancy Input Focus */
        .input-glow:focus-within {
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3), 0 0 20px rgba(99, 102, 241, 0.1);
            border-color: #6366f1;
        }

        body {
            background-color: #0B0F19;
            color: #e2e8f0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden; /* Prevent body scroll, let specific areas scroll */
        }

        /* Animated Background Elements */
        .bg-shape {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            border-radius: 50%;
            animation: blob 10s infinite alternate;
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col relative antialiased selection:bg-indigo-500/30">

    <!-- Dynamic Background Orbs -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="bg-shape bg-indigo-600/20 w-96 h-96 top-0 left-0 mix-blend-screen" style="animation-delay: 0s;"></div>
        <div class="bg-shape bg-purple-600/20 w-96 h-96 top-1/4 right-0 mix-blend-screen" style="animation-delay: 2s;"></div>
        <div class="bg-shape bg-pink-600/20 w-80 h-80 bottom-0 left-1/3 mix-blend-screen" style="animation-delay: 4s;"></div>
    </div>

    <!-- Main Application Container -->
    <div class="flex-1 flex flex-col h-full max-w-6xl mx-auto w-full z-10 p-2 sm:p-4 md:p-6 lg:p-8">
        
        <!-- Header -->
        <header class="flex items-center justify-between px-6 py-4 glass rounded-2xl mb-4 shrink-0">
            <div class="flex items-center gap-3">
                <div class="relative flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 shadow-lg shadow-indigo-500/20">
                    <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                    <div class="absolute -bottom-1 -right-1 h-3 w-3 rounded-full bg-emerald-400 border-2 border-[#151C2C]"></div>
                </div>
                <div>
                    <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-200 to-white tracking-tight">Nexus AI</h1>
                    <p class="text-xs text-indigo-300/70 font-medium tracking-wider uppercase">Advanced Assistant v3.1</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="settingsBtn" class="p-2 rounded-xl hover:bg-white/5 transition-colors text-slate-400 hover:text-white" title="Settings">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
                <button id="clearBtn" class="p-2 rounded-xl hover:bg-red-500/10 text-slate-400 hover:text-red-400 transition-colors" title="Clear Chat">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="flex-1 flex flex-col glass-panel rounded-3xl overflow-hidden relative shadow-2xl min-h-0">
            <!-- Messages Container -->
            <div id="chatHistory" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 scroll-smooth">
                <!-- Welcome Message -->
                <div class="flex items-start gap-4 animate-slide-up w-full max-w-4xl mx-auto">
                    <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-indigo-500/20 border border-indigo-500/30 text-indigo-400 mt-1">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <div class="flex flex-col gap-1 w-full">
                        <span class="text-xs font-semibold text-indigo-400 uppercase tracking-wider ml-1">Nexus AI</span>
                        <div class="glass text-slate-200 px-5 py-4 rounded-2xl rounded-tl-sm border-l-2 border-indigo-500 prose prose-invert max-w-none shadow-sm">
                            <p>Greetings. I am Nexus, an advanced generative model. How can I assist you with your tasks today?</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 sm:p-6 bg-dark-panel/80 backdrop-blur-md border-t border-dark-border shrink-0 z-20">
                <div class="max-w-4xl mx-auto relative flex items-end gap-2 sm:gap-3 input-glow transition-all duration-300 bg-dark-bg/50 border border-dark-border rounded-2xl p-2 shadow-inner">
                    
                    <button class="p-2 sm:p-3 text-slate-400 hover:text-indigo-400 hover:bg-indigo-500/10 rounded-xl transition-all shrink-0" title="Attach File">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                    </button>

                    <textarea id="userInput" rows="1" class="w-full max-h-48 bg-transparent text-white placeholder-slate-500 resize-none outline-none py-3 px-2 leading-relaxed" placeholder="Message Nexus AI..."></textarea>
                    
                    <div class="flex flex-col gap-2 shrink-0">
                        <button id="skipBtn" class="hidden p-2 sm:p-3 text-amber-400 hover:bg-amber-400/10 rounded-xl transition-all shadow-sm" title="Skip Animation">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.933 12.8a1 1 0 000-1.6L6.6 7.2A1 1 0 005 8v8a1 1 0 001.6.8l5.333-4zM19.933 12.8a1 1 0 000-1.6l-5.333-4A1 1 0 0013 8v8a1 1 0 001.6.8l5.333-4z"></path></svg>
                        </button>
                        <button id="sendBtn" class="p-2 sm:p-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl transition-all shadow-lg shadow-indigo-600/20 disabled:opacity-50 disabled:cursor-not-allowed group">
                            <svg class="w-5 h-5 transform group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="text-center mt-2 text-[10px] text-slate-500 font-medium tracking-wide uppercase">
                    AI can make mistakes. Verify important information.
                </div>
            </div>
        </main>
    </div>

    <script>
        const chatHistory = document.getElementById('chatHistory');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const skipBtn = document.getElementById('skipBtn');
        const clearBtn = document.getElementById('clearBtn');
        
        let isTyping = false;
        let skipTypingFlag = false;
        let typeInterval;
        let currentMessageDiv = null;

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            let newHeight = this.scrollHeight;
            this.style.height = (newHeight > 200 ? 200 : newHeight) + 'px';
            
            // Enable/disable send button based on content
            if(this.value.trim().length > 0) {
                sendBtn.removeAttribute('disabled');
            } else {
                sendBtn.setAttribute('disabled', 'true');
            }
        });

        // Handle Enter key (Shift+Enter for newline)
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if(!sendBtn.disabled) handleSend();
            }
        });

        sendBtn.addEventListener('click', handleSend);
        clearBtn.addEventListener('click', () => {
            if(confirm('Are you sure you want to clear the conversation?')) {
                // Keep only the welcome message
                while (chatHistory.children.length > 1) {
                    chatHistory.removeChild(chatHistory.lastChild);
                }
            }
        });

        async function handleSend() {
            if (isTyping) return;
            const text = userInput.value.trim();
            if (!text) return;

            // Reset Input
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.setAttribute('disabled', 'true');

            // Add User Message
            appendMessage('user', text);

            isTyping = true;
            skipTypingFlag = false;
            
            // Show skip button, change send button to stop style (optional, keeping simple for now)
            skipBtn.classList.remove('hidden');
            sendBtn.classList.add('hidden');
            
            // Show typing indicator
            const typingIndicatorId = showTypingIndicator();

            // Simulate Network Request Delay
            await new Promise(resolve => setTimeout(resolve, 600 + Math.random() * 800));

            // Generate Mock Response
            const responseText = generateMockResponse(text);

            // Remove typing indicator
            removeElement(typingIndicatorId);

            // Start typing effect
            await typeMessage(responseText);

            // Reset UI state
            isTyping = false;
            skipBtn.classList.add('hidden');
            sendBtn.classList.remove('hidden');
        }

        async function typeMessage(fullText) {
            return new Promise((resolve) => {
                // Create container for new AI message
                const msgId = 'msg-' + Date.now();
                const wrapper = document.createElement('div');
                wrapper.className = 'flex items-start gap-4 animate-slide-up w-full max-w-4xl mx-auto';
                
                const iconHtml = `
                    <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-indigo-500/20 border border-indigo-500/30 text-indigo-400 mt-1 shadow-[0_0_15px_rgba(99,102,241,0.2)]">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                `;

                wrapper.innerHTML = `
                    ${iconHtml}
                    <div class="flex flex-col gap-1 w-full min-w-0">
                        <span class="text-xs font-semibold text-indigo-400 uppercase tracking-wider ml-1">Nexus AI</span>
                        <div id="${msgId}" class="glass text-slate-200 px-5 py-4 rounded-2xl rounded-tl-sm border-l-2 border-indigo-500 prose prose-invert max-w-none shadow-sm typing-cursor overflow-x-auto"></div>
                    </div>
                `;
                
                chatHistory.appendChild(wrapper);
                const contentDiv = document.getElementById(msgId);
                
                // Configure marked to handle code blocks nicely
                marked.setOptions({
                    breaks: true,
                    gfm: true
                });

                let i = 0;
                // Faster typing speed for better UX
                const typingSpeed = 15; 
                let currentText = "";

                // Setup Skip button listener specifically for this typing session
                const handleSkip = () => {
                    skipTypingFlag = true;
                };
                skipBtn.addEventListener('click', handleSkip);

                typeInterval = setInterval(() => {
                    if (skipTypingFlag) {
                        clearInterval(typeInterval);
                        // Render full text immediately
                        const rawHtml = marked.parse(fullText);
                        contentDiv.innerHTML = DOMPurify.sanitize(rawHtml);
                        contentDiv.classList.remove('typing-cursor');
                        skipBtn.removeEventListener('click', handleSkip);
                        scrollToBottom();
                        resolve();
                        return;
                    }

                    if (i < fullText.length) {
                        // Chunking for slightly more realistic typing if desired, but 1 char is smoother
                        currentText += fullText.charAt(i);
                        
                        // Parse markdown on the fly (can be heavy, but DOMPurify protects)
                        // Note: Parsing partial markdown can look weird (e.g. bolding half a word).
                        // A more advanced approach would only parse complete blocks, but for this demo:
                        const rawHtml = marked.parse(currentText);
                        contentDiv.innerHTML = DOMPurify.sanitize(rawHtml);
                        
                        i++;
                        
                        // Auto-scroll logic: only scroll if user is near bottom
                        const isNearBottom = chatHistory.scrollHeight - chatHistory.scrollTop <= chatHistory.clientHeight + 100;
                        if (isNearBottom) {
                            scrollToBottom();
                        }
                    } else {
                        clearInterval(typeInterval);
                        contentDiv.classList.remove('typing-cursor');
                        skipBtn.removeEventListener('click', handleSkip);
                        scrollToBottom();
                        resolve();
                    }
                }, typingSpeed);
            });
        }

        function appendMessage(sender, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex items-start gap-4 animate-slide-up w-full max-w-4xl mx-auto ${sender === 'user' ? 'flex-row-reverse' : ''}`;
            
            let iconHtml, contentClass, headerHtml;

            if (sender === 'user') {
                iconHtml = `
                    <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-slate-700 mt-1">
                        <svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </div>`;
                headerHtml = `<span class="text-xs font-semibold text-slate-400 uppercase tracking-wider mr-1 text-right">You</span>`;
                contentClass = `bg-indigo-600 text-white px-5 py-4 rounded-2xl rounded-tr-sm shadow-md whitespace-pre-wrap`;
            }

            wrapper.innerHTML = `
                ${iconHtml}
                <div class="flex flex-col gap-1 w-full max-w-[85%] ${sender === 'user' ? 'items-end' : ''}">
                    ${headerHtml}
                    <div class="${contentClass}">${DOMPurify.sanitize(text)}</div>
                </div>
            `;
            
            chatHistory.appendChild(wrapper);
            scrollToBottom();
        }

        function showTypingIndicator() {
            const id = 'typing-' + Date.now();
            const wrapper = document.createElement('div');
            wrapper.id = id;
            wrapper.className = 'flex items-start gap-4 animate-fade-in w-full max-w-4xl mx-auto';
            wrapper.innerHTML = `
                <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-indigo-500/20 border border-indigo-500/30 text-indigo-400 mt-1">
                    <svg class="w-5 h-5 animate-spin-slow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </div>
                <div class="glass px-5 py-4 rounded-2xl rounded-tl-sm border-l-2 border-indigo-500 w-24">
                    <div class="flex gap-1.5 h-full items-center justify-center">
                        <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0ms"></div>
                        <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
                        <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 300ms"></div>
                    </div>
                </div>
            `;
            chatHistory.appendChild(wrapper);
            scrollToBottom();
            return id;
        }

        function removeElement(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            chatHistory.scrollTo({
                top: chatHistory.scrollHeight,
                behavior: 'smooth'
            });
        }

        function generateMockResponse(userInput) {
            const lowerInput = userInput.toLowerCase();
            
            if (lowerInput.includes('hello') || lowerInput.includes('hi')) {
                return "Hello there! I am fully operational and ready to assist you. What complex problems shall we solve today?";
            }
            if (lowerInput.includes('code') || lowerInput.includes('html')) {
                return "I can certainly help with code. Here is an example of a simple button in React using Tailwind CSS:\n\n```jsx\nimport React from 'react';\n\nexport default function ShinyButton() {\n  return (\n    <button className=\"px-6 py-2 bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold rounded-lg shadow-lg hover:shadow-indigo-500/30 transition-all duration-300 transform hover:-translate-y-1\">\n      Execute Action\n    </button>\n  );\n}\n```\n\nIs there a specific feature you need implemented?";
            }
            if (lowerInput.includes('thank')) {
                return "You are very welcome. I am always here to assist. Is there anything else?";
            }
            if (lowerInput.includes('design') || lowerInput.includes('ui')) {
                return "Good design is about clarity and intention. I recommend utilizing **Glassmorphism** combined with deep, rich background colors and high-contrast accents (like the Indigo used in this interface). \n\nKey elements include:\n1.  Subtle backdrop blurs.\n2.  Semi-transparent borders.\n3.  Animated background gradients or shapes.";
            }
            
            // Default rich response
            return `I have processed your input: *"**${userInput}**"*. \n\nAs an advanced AI, I can analyze this from multiple perspectives. However, since I am operating in a demonstration mode, my responses are pre-structured. \n\nTo see my formatting capabilities, observe this list:\n*   High-performance data processing\n*   Real-time analytics\n*   Natural Language Understanding\n\nFeel free to ask for a code snippet!`;
        }

        // Initialize button states
        sendBtn.setAttribute('disabled', 'true');
    </script>
</body>
</html>
